<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversation Viewer</title>
    <link rel="stylesheet" href="styles/viewer.css">
    <script src="javascript/shared.js"></script>
    <script src="javascript/conversation_viewer.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Conversation Viewer</h1>
            <div class="header-nav">
                <a href="index.html" class="btn-back">Back to Conversations</a>
            </div>
        </div>

        <div class="tab-header">
            <h2 id="persona-name">Loading...</h2>
            <div class="tab-meta">
                <div><strong>Session ID:</strong> <span id="session-id">Loading...</span></div>
                <div><strong>Total Turns:</strong> <span id="total-turns">0</span></div>
                <div><strong>Model:</strong> <span id="model-name">Loading...</span></div>
            </div>
        </div>

        <div class="conversation" id="conversation-content">
            <div class="loading">Loading conversation...</div>
        </div>

        <div class="footer">
            Generated from conversation JSON file
        </div>
    </div>

</body>
</html>
