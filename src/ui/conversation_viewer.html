<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversation Viewer</title>
    <link rel="stylesheet" href="styles/viewer.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Conversation Viewer</h1>
            <div class="header-nav">
                <a href="index.html" class="btn-back">Back to Conversations</a>
            </div>
        </div>

        <div class="tab-header">
            <h2 id="persona-name">Loading...</h2>
            <div class="tab-meta">
                <div><strong>Session ID:</strong> <span id="session-id">Loading...</span></div>
                <div><strong>Total Turns:</strong> <span id="total-turns">0</span></div>
                <div><strong>Model:</strong> <span id="model-name">Loading...</span></div>
            </div>
        </div>

        <div class="conversation" id="conversation-content">
            <div class="loading">Loading conversation...</div>
        </div>

        <div class="footer">
            Generated from conversation JSON file
        </div>
    </div>

    <script>
        const PERSONA_NAMES = {
            1: "Disengaged",
            2: "Motivated",
            3: "Frustrated",
            4: "Wrong Answers"
        };

        function getSessionIdFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get("session");
        }

        async function loadConversation() {
            const sessionId = getSessionIdFromURL();
            
            if (!sessionId) {
                showError("No session ID provided in URL");
                return;
            }

            try {
                // Try to load conversation from conversations folder
                // Since we don't know the exact filename, try loading all and match by session_id
                const conversationData = await findConversationBySessionId(sessionId);
                
                if (!conversationData) {
                    showError("Conversation not found");
                    return;
                }
                displayConversation(conversationData);
            } catch (err) {
                console.error("Error loading conversation:", err);
                showError("Error loading conversation. Check console for details.");
            }
        }

        async function findConversationBySessionId(sessionId) {
            // Try to load known conversation files
            const personaFiles = [
                "conversation_per_1_sc_1_gemini.json",
                "conversation_per_2_sc_1_gemini.json",
                "conversation_per_3_sc_1_gemini.json",
                "conversation_per_4_sc_1_gemini.json",
                "conversation_per_1_sc_1_openai.json",
                "conversation_per_1_sc_2_openai.json",
                "conversation_per_1_sc_3_openai.json",
                "conversation_per_1_sc_4_openai.json",
                "conversation_per_2_sc_1_openai.json",
                "conversation_per_2_sc_2_openai.json",
                "conversation_per_2_sc_3_openai.json",
                "conversation_per_2_sc_4_openai.json",
                "conversation_per_3_sc_1_openai.json",
                "conversation_per_3_sc_2_openai.json",
                "conversation_per_3_sc_3_openai.json",
                "conversation_per_3_sc_4_openai.json",
                "conversation_per_4_sc_1_openai.json",
                "conversation_per_4_sc_2_openai.json",
                "conversation_per_4_sc_3_openai.json",
                "conversation_per_4_sc_4_openai.json"
            ];
            

            for (const file of personaFiles) {
                try {
                    const response = await fetch(`conversations/${file}`);
                    if (!response.ok) continue;

                    const data = await response.json();
                    if (data.session_id === sessionId) {
                        return data;
                    }
                } catch (err) {
                    // File doesn't exist or can't be read, continue
                }
            }

            return null;
        }

        function displayConversation(conversation) {
            const personaNum = conversation.persona_number || "N/A";
            const personaName = PERSONA_NAMES[personaNum] || "Unknown";
            const sessionId = conversation.session_id || "N/A";
            const turns = conversation.turns || [];
            const modelName = conversation.model_used || "Unknown";

            // Update header
            document.getElementById("persona-name").textContent = personaName;
            document.getElementById("session-id").textContent = sessionId;
            document.getElementById("model-name").textContent = modelName;
            
            // Calculate number of turns (divide by 2 since each turn has student + tutor)
            const turnCount = Math.floor(turns.length / 2);
            document.getElementById("total-turns").textContent = turnCount;

            // Build conversation HTML
            let conversationHTML = "";
            let turnNumber = 1;

            for (const turn of turns) {
                const role = turn.role || "unknown";
                const text = turn.text || "";

                if (role.toLowerCase() === "student") {
                    conversationHTML += `
                        <div class="turn">
                            <div class="turn-number">Turn ${turnNumber}</div>
                            <div class="message student-message">
                                <div class="message-header">Student</div>
                                <div class="message-text">${escapeHtml(text)}</div>
                            </div>
                    `;
                } else if (role.toLowerCase() === "tutor") {
                    conversationHTML += `
                            <div class="message tutor-message">
                                <div class="message-header">Tutor</div>
                                <div class="message-text">${escapeHtml(text)}</div>
                            </div>
                        </div>
                    `;
                    turnNumber++;
                }
            }

            // Close any unclosed turn div
            if (turns.length > 0 && turns[turns.length - 1].role.toLowerCase() === "student") {
                conversationHTML += "</div>";
            }

            document.getElementById("conversation-content").innerHTML = conversationHTML;
        }

        function showError(message) {
            document.getElementById("conversation-content").innerHTML = `
                <div class="error-message">
                    <strong>Error:</strong> ${escapeHtml(message)}
                </div>
            `;
            document.getElementById("persona-name").textContent = "Error";
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        // Load conversation when page loads
        window.addEventListener("DOMContentLoaded", loadConversation);
    </script>
</body>
</html>
